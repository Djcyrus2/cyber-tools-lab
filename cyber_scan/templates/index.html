<!DOCTYPE html>
<html>
<head>
    <title>Cyber Tools Lab Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Cyber Tools Lab</h1>

<h2>Scan History</h2>

<table>

<tr>
    <th>Target</th>
    <th>Port</th>
    <th>Status</th>
    <th>Time</th>
</tr>

{% for scan in scans %}

<tr>

<td>{{ scan[0] }}</td>
<td>{{ scan[1] }}</td>
<td>{{ scan[2] }}</td>
<td>{{ scan[3] }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
